<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub Científico - Arquivologia e Ciência da Informação</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --azul-institucional: #1351b4;
            --fundo: #f8f9fa;
            --texto: #333333;
            --borda: #cccccc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--fundo);
            color: var(--texto);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            line-height: 1.25;
        }

        header {
            background-color: var(--azul-institucional);
            color: white;
            padding: 1.5rem;
            text-align: center;
            font-weight: 600;
            letter-spacing: 1px;
            font-size: 1.2rem;
        }

        main {
            flex: 1;
            max-width: 900px;
            margin: 2rem auto;
            padding: 2rem;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            width: 100%;
            box-sizing: border-box;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--azul-institucional);
            border-bottom: 2px solid var(--azul-institucional);
            padding-bottom: 0.5rem;
            margin-top: 0;
        }

        .controles {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        select {
            flex: 1;
            padding: 0.75rem;
            border: 1px solid var(--borda);
            border-radius: 4px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            background-color: white;
        }

        select:disabled {
            background-color: #e9ecef;
            cursor: not-allowed;
        }

        .lista-artigos {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .artigo-item {
            padding: 1.5rem;
            border-bottom: 1px solid #eeeeee;
            transition: background-color 0.2s;
        }

        .artigo-item:hover {
            background-color: #fdfdfd;
        }

        .artigo-titulo {
            font-weight: 600;
            font-size: 1.2rem;
            color: var(--azul-institucional);
            margin: 0 0 0.5rem 0;
        }

        .artigo-autores {
            font-style: italic;
            font-size: 0.95rem;
            color: #555555;
            margin: 0 0 0.75rem 0;
        }

        .artigo-resumo {
            font-size: 0.95rem;
            color: #666666;
            margin: 0 0 1rem 0;
            text-align: justify;
        }

        .btn-pdf {
            display: inline-block;
            padding: 0.5rem 1rem;
            background-color: var(--azul-institucional);
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .btn-pdf:hover {
            background-color: #0f4396;
        }

        footer {
            background-color: var(--azul-institucional);
            color: white;
            text-align: center;
            padding: 1rem;
            font-size: 0.9rem;
            margin-top: auto;
        }
    </style>
</head>
<body>

    <header>
        ARQUIVO / SEC
    </header>

    <main>
        <h1>Acervo de Artigos Científicos</h1>
        
        <div class="controles">
            <select id="select-revista">
                <option value="">Selecione uma Revista...</option>
            </select>

            <select id="select-edicao" disabled>
                <option value="">Selecione a Edição...</option>
            </select>
        </div>

        <ul class="lista-artigos" id="resultado-artigos">
            </ul>
    </main>

    <footer>
        Desenvolvido por Vinicius A. de Souza
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
